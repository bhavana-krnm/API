<!DOCTYPE html>
<html>
<head>
    <title>Employee Form</title>
</head>
<body>

<h2>Employee Details</h2>

<form id="empForm">
    <label>Name</label><br>
    <input type="text" id="name" required><br><br>

    <label>Department</label><br>
    <input type="text" id="dept" required><br><br>

    <label>Salary</label><br>
    <input type="number" id="salary" required><br><br>

    <button type="submit">Save</button>
</form>

<script>

document.getElementById("empForm").addEventListener("submit", function(e){

    e.preventDefault();

    fetch("/employee",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            name:document.getElementById("name").value,
            dept:document.getElementById("dept").value,
            salary:document.getElementById("salary").value
        })
    })
    .then(response=>{
        if(response.ok){
            return response.json();
        }
        throw new Error();
    })
    .then(data=>{
        sessionStorage.setItem("employee",JSON.stringify(data));
        sessionStorage.setItem("status","success");
        window.location.href="result.html";
    })
    .catch(()=>{
        sessionStorage.setItem("status","fail");
        window.location.href="result.html";
    });
});
</script>

</body>
</html>
